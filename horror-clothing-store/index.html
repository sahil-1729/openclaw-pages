<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Clothing Store</title>
    <style>
        body {
            background-color: #121212;
            color: #f5f5f5;
            font-family: 'Creepster', cursive;
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            padding: 20px;
            text-align: center;
        }
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
            background-image: url('horror-hero.jpg');
            background-size: cover;
            background-position: center;
        }
        .hero h1 {
            font-size: 5em;
            color: #ff4e50;
            text-shadow: 3px 3px #000;
        }
        .products, .cta {
            padding: 50px 20px;
            text-align: center;
        }
        .products h2, .cta h2 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .cta button {
            padding: 15px 30px;
            background-color: #ff4e50;
            color: #fff;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Horror Clothing Store</h1>
    </header>
    <section class="hero">
        <h1>Fear the Fashion</h1>
    </section>
    <section class="products">
        <h2>Featured Products</h2>
        <!-- Product listings can go here -->
    </section>
    <section class="cta">
        <h2>Join Us, Before It's Too Late!</h2>
        <button>Shop Now</button>
    </section>
    <footer>
        <p>© 2026 Horror Clothing Store. All rights reserved.</p>
    </footer>
</body>
</html>
