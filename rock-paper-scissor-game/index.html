<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <style>
        :root {
            --primary-color: #ff4500;
            --secondary-color: #32cd32;
            --background-color: #fafafa;
            --font-family: 'Helvetica Neue', sans-serif;
        }
        body {
            margin: 0;
            font-family: var(--font-family);
            background-color: var(--background-color);
        }
        .hero {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }
        .description, .footer {
            padding: 20px;
            text-align: center;
        }
        .cta button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 20px;
        }
        .footer {
            background-color: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Play Rock Paper Scissors</h1>
        <p>Challenge yourself in this timeless classic.</p>
    </div>
    <div class="description">
        <p>Face off against the computer in a game of strategy and luck. Choose rock, paper, or scissors and see who wins!</p>
    </div>
    <div class="cta">
        <button>Play Now</button>
    </div>
    <div class="footer">
        <p>&copy; 2026 Rock Paper Scissors Game. All rights reserved.</p>
    </div>
</body>
</html>
