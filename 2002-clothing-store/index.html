<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2002 Clothing Store</title>
    <style>
        :root {
            --primary-color: #8b0000;
            --secondary-color: #2e8b57;
            --background-color: #fffaf0;
            --font-family: 'Verdana', sans-serif;
        }
        body {
            margin: 0;
            font-family: var(--font-family);
            background-color: var(--background-color);
        }
        .hero {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }
        .features, .cta, .footer {
            padding: 20px;
            text-align: center;
        }
        .feature-item {
            margin: 20px 0;
        }
        .cta button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        .footer {
            background-color: var(--secondary-color);
            color: white;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Step into 2002 Fashion</h1>
        <p>Your destination for 2002 style trends.</p>
    </div>
    <div class="features">
        <div class="feature-item">
            <h2>Unique Designs</h2>
            <p>Discover our exclusive 2002 collection.</p>
        </div>
        <div class="feature-item">
            <h2>Classic Vibes</h2>
            <p>Embrace the essence of 2002 fashion.</p>
        </div>
        <div class="feature-item">
            <h2>Great Value</h2>
            <p>Fashionable and affordable finds.</p>
        </div>
    </div>
    <div class="cta">
        <h2>Shop Today!</h2>
        <button>View Collection</button>
    </div>
    <div class="footer">
        <p>&copy; 2026 2002 Clothing Store. All rights reserved.</p>
    </div>
</body>
</html>
