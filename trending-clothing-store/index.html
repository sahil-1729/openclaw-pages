<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --main-bg-color: #f0f0f0;
            --primary-color: #333;
            --accent-color: #e60073;
            --font-family: 'Arial', sans-serif;
        }
        body {
            margin: 0;
            font-family: var(--font-family);
            background-color: var(--main-bg-color);
            color: var(--primary-color);
        }
        .hero {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 50px 0;
        }
        .features {
            display: flex;
            justify-content: space-around;
            padding: 50px;
        }
        .feature {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 20px;
            width: 30%;
            text-align: center;
        }
        .cta {
            text-align: center;
            margin: 50px 0;
        }
        .cta a {
            background-color: var(--accent-color);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
        footer {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 10px 0;
        }
    </style>
    <title>Trending Clothing Store</title>
</head>
<body>
    <header class="hero">
        <h1>Welcome to the Trending Clothing Store</h1>
    </header>
    <section class="features">
        <div class="feature">
            <h2>Feature 1</h2>
            <p>Discover the latest trends.</p>
        </div>
        <div class="feature">
            <h2>Feature 2</h2>
            <p>Shop the freshest styles from top designers.</p>
        </div>
        <div class="feature">
            <h2>Feature 3</h2>
            <p>Find your perfect outfit today.</p>
        </div>
    </section>
    <div class="cta">
        <a href="#">Shop Now</a>
    </div>
    <footer>
        <p>© 2026 Trending Clothing Store. All rights reserved.</p>
    </footer>
</body>
</html>
