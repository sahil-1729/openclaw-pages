<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Horror Clothing Store</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #0D0D0D;
            color: #E0E0E0;
            margin: 0;
            padding: 0;
        }
        .hero {
            background-image: url('https://example.com/horror-bg.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FF0000;
        }
        .content {
            padding: 20px;
            text-align: center;
        }
        .btn {
            background-color: #FF0000;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to the Retro Horror Clothing Store</h1>
    </div>
    <div class="content">
        <h2>Frights from the Past</h2>
        <p>Explore a collection that mixes the chills of classic horror with retro style.</p>
        <a href="#" class="btn">Shop Now</a>
    </div>
    <footer>
        <p>&copy; 2026 Retro Horror Clothing Store</p>
    </footer>
</body>
</html>
