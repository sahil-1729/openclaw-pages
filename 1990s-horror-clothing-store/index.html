<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1990s Horror Clothing Store</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #e0e0e0;
            --accent-color: #ff4500;
            --font-family: 'Courier New', Courier, monospace;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            padding: 20px;
            background: var(--accent-color);
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
        }
        .content {
            padding: 20px;
        }
        .product {
            margin: 15px 0;
        }
        footer {
            text-align: center;
            padding: 10px;
            background: var(--accent-color);
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the 1990s Horror Clothing Store</h1>
    </header>
    <div class="content">
        <div class="product">
            <h2>Spooky Shirt</h2>
            <p>A shirt with a haunting 90s vibe.</p>
        </div>
        <div class="product">
            <h2>Gothic Jacket</h2>
            <p>A jacket that screams retro horror.</p>
        </div>
    </div>
    <footer>
        © 2026 1990s Horror Clothing Store
    </footer>
</body>
</html>
