<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <style>
        :root {
            --primary-color: #333;
            --accent-color: #ff4500;
            --background-color: #f5f5f5;
            --font-family: 'Arial', sans-serif;
        }
        body {
            margin: 0;
            font-family: var(--font-family);
            background-color: var(--background-color);
        }
        .hero {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }
        .description, .footer {
            padding: 20px;
            text-align: center;
        }
        .cta button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 20px;
        }
        .footer {
            background-color: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to Hangman</h1>
        <p>Guess the word, letter by letter.</p>
    </div>
    <div class="description">
        <p>Challenge yourself in this classic game of deduction and strategy. Try to reveal the hidden word before the stick figure meets its fate!</p>
    </div>
    <div class="cta">
        <button>Play Now</button>
    </div>
    <div class="footer">
        <p>&copy; 2026 Hangman Game. All rights reserved.</p>
    </div>
</body>
</html>
