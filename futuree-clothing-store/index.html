<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuree Clothing Store</title>
    <style>
        :root {
            --primary-color: #00ffcc;
            --secondary-color: #ff00ff;
            --background-color: #101010;
            --text-color: #ffffff;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }
        .hero {
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 {
            font-size: 4rem;
            margin: 0;
        }
        .features {
            display: flex;
            padding: 4rem 2rem;
            justify-content: space-around;
        }
        .feature {
            text-align: center;
            width: 30%;
        }
        footer {
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to the Future</h1>
    </div>
    <div class="features">
        <div class="feature">
            <h2>Innovative Design</h2>
            <p>Step into the future with cutting-edge fashion.</p>
        </div>
        <div class="feature">
            <h2>Advanced Materials</h2>
            <p>Experience the comfort of tomorrow's technology.</p>
        </div>
        <div class="feature">
            <h2>Sustainability</h2>
            <p>Fashion that supports a sustainable future.</p>
        </div>
    </div>
    <footer>
        &copy; 2026 Futuree Clothing Store. All rights reserved.
    </footer>
</body>
</html>
